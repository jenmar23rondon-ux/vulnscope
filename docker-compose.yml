services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vulnscope
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/vulnscope
      JWT_SECRET: docker_vulnscope_secret_change_me
      FRONTEND_ORIGIN: http://localhost:5174
    ports:
      - "8001:8001"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5174:80"

volumes:
  postgres_data:
